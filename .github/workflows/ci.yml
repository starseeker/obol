name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    name: Linux build (${{ matrix.gl_mode }}, unity=${{ matrix.unity_build }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        gl_mode: [system-only, osmesa-only, dual]
        unity_build: [ON, OFF]
        include:
          - gl_mode: system-only
            cmake_gl_flags: -DOBOL_USE_SYSTEM_ONLY=ON
          - gl_mode: osmesa-only
            cmake_gl_flags: -DOBOL_USE_OSMESA=ON
          - gl_mode: dual
            cmake_gl_flags: -DOBOL_BUILD_DUAL_GL=ON

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake \
            libpng-dev \
            libx11-dev libxext-dev libxi-dev libxrandr-dev \
            libxcursor-dev libxft-dev libxinerama-dev \
            libgl-dev libglu1-mesa-dev \
            libfontconfig-dev libfreetype-dev \
            xvfb

      - name: Configure
        run: |
          cmake -S . -B build \
            -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DOBOL_BUILD_TESTS=ON \
            -DOBOL_USE_UNITY_BUILD=${{ matrix.unity_build }} \
            ${{ matrix.cmake_gl_flags }}

      - name: Build
        run: cmake --build build --config Release -- -j$(nproc)

      - name: Run tests
        run: |
          cd build
          xvfb-run -a ctest --output-on-failure -C Release
